<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 64px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 360px;
        }

        .timer {
            font-size: 96px;
            font-weight: 200;
            color: #333;
            margin-bottom: 16px;
            font-variant-numeric: tabular-nums;
        }

        .status {
            font-size: 18px;
            color: #666;
            margin-bottom: 32px;
            height: 24px;
        }

        .status.focus { color: #e74c3c; }
        .status.break { color: #27ae60; }
        .status.paused { color: #f39c12; }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-start {
            background: #27ae60;
            color: white;
        }

        .btn-pause {
            background: #f39c12;
            color: white;
        }

        .btn-reset {
            background: #95a5a6;
            color: white;
        }

        .btn-switch {
            background: #3498db;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="timer" id="timer">25:00</div>
        <div class="status" id="status">准备开始</div>
        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="start()">开始</button>
            <button class="btn-pause" id="pauseBtn" onclick="pause()">暂停</button>
            <button class="btn-reset" id="resetBtn" onclick="reset()">重置</button>
            <button class="btn-switch" id="switchBtn" onclick="switchMode()">切换</button>
        </div>
    </div>

    <script>
        const FOCUS_TIME = 25 * 60;
        const BREAK_TIME = 5 * 60;
        
        let timeLeft = FOCUS_TIME;
        let isRunning = false;
        let isFocusMode = true;
        let interval = null;

        const timerEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerEl.textContent = formatTime(timeLeft);
        }

        function updateStatus() {
            if (isRunning) {
                statusEl.textContent = isFocusMode ? '专注中' : '休息中';
                statusEl.className = 'status ' + (isFocusMode ? 'focus' : 'break');
            }
        }

        function start() {
            if (isRunning) return;
            isRunning = true;
            updateStatus();
            
            interval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    isRunning = false;
                    
                    // 切换模式
                    isFocusMode = !isFocusMode;
                    timeLeft = isFocusMode ? FOCUS_TIME : BREAK_TIME;
                    updateDisplay();
                    statusEl.textContent = '时间到！';
                    statusEl.className = 'status';
                }
            }, 1000);
        }

        function pause() {
            if (!isRunning) return;
            isRunning = false;
            clearInterval(interval);
            statusEl.textContent = '已暂停';
            statusEl.className = 'status paused';
        }

        function reset() {
            isRunning = false;
            clearInterval(interval);
            isFocusMode = true;
            timeLeft = FOCUS_TIME;
            updateDisplay();
            statusEl.textContent = '准备开始';
            statusEl.className = 'status';
        }

        function switchMode() {
            isRunning = false;
            clearInterval(interval);
            isFocusMode = !isFocusMode;
            timeLeft = isFocusMode ? FOCUS_TIME : BREAK_TIME;
            updateDisplay();
            statusEl.textContent = isFocusMode ? '准备开始' : '休息中';
            statusEl.className = 'status ' + (isFocusMode ? '' : 'break');
        }
    </script>
</body>
</html>
